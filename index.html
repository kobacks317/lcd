<!DOCTYPE html>
<html lang="ja">

    <head>
        <meta charset="UTF-8">
        <title>Train Info LCD Menu</title>
        <script src="./main.js" defer></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@100..900&family=M+PLUS+1p:wght@100;300;400;500;700;800;900&family=Noto+Sans+JP:wght@100..900&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <style>
            * { box-sizing: border-box; }
            body {
                margin: 0;
                min-height: 100vh;
                font-family: 'Noto Sans JP', 'Public Sans', sans-serif;
                background: #f4f6fb;
                color: #202124;
            }
            header {
                padding: 1rem 1.5rem;
                background: #0f172a;
                color: #f8fafc;
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 1rem;
            }
            header h1 {
                margin: 0;
                font-size: 1.3rem;
                flex: 1 1 auto;
            }
            main {
                padding: 1.5rem;
                display: flex;
                flex-direction: column;
                gap: 1.5rem;
            }
            .card {
                background: #ffffff;
                border: 1px solid #e2e8f0;
                border-radius: 16px;
                padding: 1.25rem;
                box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);
            }
            .control-row {
                display: flex;
                flex-wrap: wrap;
                gap: 0.75rem;
                align-items: center;
            }
            .station-arrow-buttons {
                display: flex;
                gap: 0.5rem;
            }
            .station-arrow-buttons button {
                padding: 0.5rem 0.6rem;
                border: 1px solid #cbd5e1;
                border-radius: 8px;
                background: #ffffff;
                cursor: pointer;
                transition: background-color 0.2s ease;
                min-width: 40px;
                font-weight: bold;
            }
            .station-arrow-buttons button:disabled {
                opacity: 0.55;
                cursor: not-allowed;
            }
            .control-row label {
                font-weight: 700;
            }
            #configFile,
            #originStation,
            #terminalStation,
            #trainType,
            #currentStation,
            #startButton,
            #pauseButton {
                padding: 0.5rem 0.6rem;
                border: 1px solid #cbd5e1;
                border-radius: 8px;
                background: #ffffff;
                min-width: 220px;
            }
            #startButton {
                cursor: pointer;
                transition: background-color 0.2s ease;
            }
            #startButton:disabled {
                opacity: 0.55;
                cursor: not-allowed;
            }
            #status {
                margin-top: 0.8rem;
                color: #334155;
                line-height: 1.6;
            }
            .fullscreen {
                padding: 0 !important;
            }
            iframe {
                width: 100%;
                height: 100%;
                border: none;
                margin: 0;
                padding: 0;
                display: block;
                overflow: hidden;
                background: transparent;
            }
            @media (max-width: 720px) {
                header, main {
                    padding-left: 1rem;
                    padding-right: 1rem;
                }
                iframe {
                    min-height: 180px;
                }
            }
            @media (max-width: 720px) {
                header, main {
                    padding-left: 1rem;
                    padding-right: 1rem;
                }
                iframe {
                    min-height: 320px;
                }
            }
        </style>
    </head>

    <body>
        <header>
            <h1>LCDメニュー / config JSON 選択</h1>
            <div id="selectedConfig">選択された設定: なし</div>
        </header>

        <main>
            <section class="card" id="menuSection">
                <div class="control-row">
                    <label for="configFile">config JSON を選択</label>
                    <select id="configFile">
                        <option value="">-- 選択してください --</option>
                    </select>
                </div>
                <div class="control-row">
                    <label for="originStation">始発駅</label>
                    <select id="originStation" disabled>
                        <option value="">-- なし --</option>
                    </select>
                </div>
                <div class="control-row">
                    <label for="terminalStation">終着駅</label>
                    <select id="terminalStation" disabled>
                        <option value="">-- なし --</option>
                    </select>
                </div>
                <div class="control-row">
                    <label for="trainType">列車種別</label>
                    <select id="trainType" disabled>
                        <option value="">-- なし --</option>
                    </select>
                </div>
                <div class="control-row">
                    <label for="currentStation">現在駅</label>
                    <select id="currentStation" disabled>
                        <option value="">-- なし --</option>
                    </select>
                    <div class="station-arrow-buttons">
                        <button id="prevStationButton" disabled>←</button>
                        <button id="nextStationButton" disabled>→</button>
                    </div>
                </div>
                <div class="control-row">
                    <button id="startButton" disabled>開始</button>
                    <button id="pauseButton" disabled>更新停止</button>
                </div>
                <div id="status">config フォルダー内の JSON ファイルを選択してください。</div>
            </section>
        </main>
    </body>

</html>
