<!DOCTYPE html>
<html lang="ja">

    <head>
        <meta charset="UTF-8">
        <title>Train Info LCD Menu</title>
        <script src="./main.js" defer></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@100..900&family=M+PLUS+1p:wght@100;300;400;500;700;800;900&family=Noto+Sans+JP:wght@100..900&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./menu.css" />
    </head>

    <body>
        <header>
            <h1>LCDメニュー / config JSON 選択</h1>
            <div id="selectedConfig">選択された設定: なし</div>
        </header>

        <main>
            <section class="card" id="menuSection">
                <div class="control-row">
                    <label for="configFile">config JSON を選択</label>
                    <select id="configFile">
                        <option value="">-- 選択してください --</option>
                    </select>
                </div>
                <div class="control-row">
                    <label for="originStation">始発駅</label>
                    <select id="originStation" disabled>
                        <option value="">-- なし --</option>
                    </select>
                </div>
                <div class="control-row">
                    <label for="terminalStation">終着駅</label>
                    <select id="terminalStation" disabled>
                        <option value="">-- なし --</option>
                    </select>
                </div>
                <div class="control-row">
                    <label for="trainType">列車種別</label>
                    <select id="trainType" disabled>
                        <option value="">-- なし --</option>
                    </select>
                </div>
                <div class="control-row">
                    <label for="currentStation">現在駅</label>
                    <select id="currentStation" disabled>
                        <option value="">-- なし --</option>
                    </select>
                    <div class="station-arrow-buttons">
                        <button id="prevStationButton" disabled>←</button>
                        <button id="nextStationButton" disabled>→</button>
                    </div>
                </div>
                <div class="control-row">
                    <label for="currentStatus">ステータス</label>
                    <select id="currentStatus" disabled>
                        <option value="0">1 走行中</option>
                        <option value="1">2 到着中</option>
                        <option value="2">3 停車中</option>
                        <option value="3">4 発車前</option>
                    </select>
                    <div class="status-arrow-buttons">
                        <button id="prevStatusButton" disabled>←</button>
                        <button id="nextStatusButton" disabled>→</button>
                    </div>
                </div>
                <div class="control-row">
                    <button id="startButton" disabled>開始</button>
                    <button id="pauseButton" disabled>更新停止</button>
                </div>
                <div id="status">config フォルダー内の JSON ファイルを選択してください。</div>
            </section>
        </main>
    </body>

</html>
