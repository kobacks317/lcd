<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCD ビューア - Railway Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    .lcd-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #mainAreaWrap {
      flex-shrink: 0;
      overflow: hidden;
      border-bottom: 3px solid #ffff00;
      background: #000;
    }

    #mainAreaWrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* メインエリアがない場合のフォールバック表示 */
    .main-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #ffff00;
      font-family: 'Courier New', monospace;
      text-align: center;
      padding: 20px;
    }
    .main-fallback .status-line { font-size: 18px; }
    .main-fallback .train-type {
      display: inline-block;
      padding: 6px 14px;
      border: 2px solid #fff;
      border-radius: 4px;
      font-weight: bold;
      font-size: 16px;
    }
    .main-fallback .destination { font-size: 24px; font-weight: bold; }
    .main-fallback .sta-name { font-size: 20px; }

    #infoAreaWrap {
      flex: 1;
      overflow: hidden;
      background: #111;
      border-top: 3px solid #ffff00;
      position: relative;
    }

    #infoAreaWrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* インフォエリアにHTMLがない場合のフォールバック */
    .info-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #0f0;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      text-align: center;
      gap: 8px;
    }
    .slide-indicator {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 10px;
      color: rgba(255,255,100,0.5);
      font-family: monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="lcd-container">
  <div id="mainAreaWrap">
    <div class="main-fallback" id="mainFallback">
      <div class="status-line" id="fbStatusLine">接続待機中...</div>
      <div class="train-type" id="fbTrainType">-- 種別 --</div>
      <div class="destination" id="fbDestination">-- 行き先 --</div>
      <div class="sta-name" id="fbStaName">-- 駅名 --</div>
    </div>
  </div>
  <div id="infoAreaWrap">
    <div class="info-fallback" id="infoFallback">
      <div>インフォメーションエリア</div>
      <div style="color:#555;font-size:11px">制御パネルのデザイン定義でHTMLを設定してください</div>
    </div>
    <div class="slide-indicator" id="slideIndicator"></div>
  </div>
</div>

<script>
// =====================================
// 状態管理
// =====================================
let pendingPacket   = null;
let slideTimer      = null;
let currentSlideIdx = 0;
let currentSlides   = [];
let currentState    = null;
let currentMainHtml = null;

// =====================================
// postMessage 受信
// =====================================
window.addEventListener('message', (event) => {
  try {
    const pkt = event.data;

    // 親ウィンドウから初回データリクエスト応答
    if (pkt.type === 'viewer-ready') return;

    if (pkt.operation && pkt.masterData) {
      pendingPacket = pkt;
      updateDisplay(pkt);
    }
  } catch (err) {
    console.warn('viewer message error:', err.message);
  }
});

// =====================================
// 表示更新
// =====================================
function updateDisplay(pkt) {
  const op     = pkt.operation;
  const master = pkt.masterData;
  const design = master.design || {};

  // --- メインエリア ---
  const mainHtml   = design.mainPage?.html || '';
  const mainHeight = parseInt(design.mainPage?.height) || 400;
  updateMainArea(mainHtml, mainHeight, pkt);

  // --- インフォエリア スライドショー ---
  const newState  = op.currentState || 'running';
  const newSlides = design.infoArea?.states?.[newState] || [];
  const slidesKey = newState + '|' + JSON.stringify(newSlides.map(s => s.html));

  if (slidesKey !== currentState) {
    currentState  = slidesKey;
    currentSlides = newSlides;
    startSlideshow(newSlides, pkt);
  } else {
    // 同じスライド構成 → 現在のiframeにデータだけ送信
    sendToInfoFrame(pkt);
  }

  // フォールバック表示更新
  updateFallback(op, master);
}

// =====================================
// メインエリア
// =====================================
function updateMainArea(html, height, pkt) {
  const wrap = document.getElementById('mainAreaWrap');
  wrap.style.height = height + 'px';

  if (!html) {
    // フォールバック表示
    showMainFallback(true);
    return;
  }

  if (html !== currentMainHtml) {
    currentMainHtml = html;
    showMainFallback(false);
    const frame = document.createElement('iframe');
    frame.id = 'mainFrame';
    frame.src = html;
    // iframeがロードされたらデータ送信
    frame.addEventListener('load', () => sendToFrame(frame, pkt), { once: false });
    // 既存のiframeを差し替え
    const old = document.getElementById('mainFrame');
    if (old) old.remove();
    wrap.appendChild(frame);
  } else {
    // 同じsrc → データだけ送信
    const frame = document.getElementById('mainFrame');
    if (frame) sendToFrame(frame, pkt);
  }
}

function showMainFallback(show) {
  const fb = document.getElementById('mainFallback');
  const fr = document.getElementById('mainFrame');
  if (fb) fb.style.display = show ? 'flex' : 'none';
  if (fr) fr.style.display = show ? 'none' : 'block';
}

// =====================================
// インフォエリア スライドショー
// =====================================
function startSlideshow(slides, pkt) {
  if (slideTimer) { clearTimeout(slideTimer); slideTimer = null; }
  currentSlideIdx = 0;

  if (!slides || slides.length === 0) {
    showInfoFallback(true);
    return;
  }
  showInfoFallback(false);
  showSlide(slides, pkt);
}

function showSlide(slides, pkt) {
  if (!slides || slides.length === 0) return;
  const slide = slides[currentSlideIdx % slides.length];

  updateSlideIndicator(currentSlideIdx, slides.length, slide);

  if (slide.html) {
    const wrap  = document.getElementById('infoAreaWrap');
    const oldFr = document.getElementById('infoFrame');

    if (oldFr && oldFr.src.endsWith(slide.html.replace(/^\//, ''))) {
      // 同じsrc → データだけ再送
      sendToFrame(oldFr, pkt || pendingPacket);
    } else {
      const frame = document.createElement('iframe');
      frame.id = 'infoFrame';
      frame.addEventListener('load', () => sendToFrame(frame, pkt || pendingPacket), { once: false });
      frame.src = slide.html;
      if (oldFr) oldFr.remove();
      else document.getElementById('infoFallback')?.remove();
      wrap.insertBefore(frame, wrap.querySelector('.slide-indicator'));
    }
  }

  const duration = (slide.duration || 5) * 1000;
  slideTimer = setTimeout(() => {
    currentSlideIdx = (currentSlideIdx + 1) % slides.length;
    showSlide(slides, pendingPacket);
  }, duration);
}

function sendToInfoFrame(pkt) {
  const frame = document.getElementById('infoFrame');
  if (frame) sendToFrame(frame, pkt);
}

function showInfoFallback(show) {
  const wrap = document.getElementById('infoAreaWrap');
  let fb = document.getElementById('infoFallback');
  const fr = document.getElementById('infoFrame');
  if (show) {
    if (!fb) {
      fb = document.createElement('div');
      fb.id = 'infoFallback';
      fb.className = 'info-fallback';
      fb.innerHTML = '<div>インフォメーションエリア</div><div style="color:#555;font-size:11px">デザイン定義でスライドを設定してください</div>';
      wrap.insertBefore(fb, wrap.querySelector('.slide-indicator'));
    }
    fb.style.display = 'flex';
    if (fr) fr.style.display = 'none';
  } else {
    if (fb) fb.style.display = 'none';
    if (fr) fr.style.display = 'block';
  }
}

function updateSlideIndicator(idx, total, slide) {
  const el = document.getElementById('slideIndicator');
  if (!el) return;
  el.textContent = total > 1 ? `${idx+1}/${total} · ${slide.duration||5}s` : '';
}

// =====================================
// postMessage 転送
// =====================================
function sendToFrame(frame, pkt) {
  if (!frame || !pkt) return;
  try { frame.contentWindow.postMessage(pkt, '*'); } catch {}
}

// =====================================
// フォールバック表示 (デザイン未設定時)
// =====================================
function updateFallback(op, master) {
  const system = master.train?.systems?.find(s => s.id === op.currentSystemId);
  if (!system) return;

  let allStations = [];
  (system.routes || []).forEach(r => {
    const rd = master.routes?.[r.lineId];
    if (rd?.stations) allStations.push(...rd.stations);
  });

  const sta   = allStations[op.currentStationIndex] || {};
  const type  = master.train?.types?.find(t => t.id === op.currentTrainTypeId) || {};
  const langs = op.displayLanguages || ['ja'];
  const lang  = langs[Math.floor(Date.now() / 3000) % langs.length];

  const stateLabels = {
    running:   { ja:'つぎは', en:'Next', kana:'つぎは' },
    arriving:  { ja:'まもなく', en:'Arriving', kana:'まもなく' },
    stopping:  { ja:'ただいま', en:'Now at', kana:'ただいま' },
    departing: { ja:'発車します', en:'Departing', kana:'はっしゃします' },
  };
  const prefix = stateLabels[op.currentState]?.[lang] || '';

  setFbText('fbStatusLine', prefix + ' ' + (sta.name?.[lang] || sta.name?.ja || ''));
  setFbText('fbTrainType',  type.name?.[lang] || type.name?.ja || '--');
  const lastRoute = system.routes?.[system.routes.length - 1];
  setFbText('fbDestination', lastRoute ? `${lastRoute.name||''}ゆき` : '--');
  setFbText('fbStaName', (sta.name?.[lang] || sta.name?.ja || '--'));

  const typeEl = document.getElementById('fbTrainType');
  if (typeEl && type.bg) {
    typeEl.style.background = type.bg;
    typeEl.style.color = type.fg || '#fff';
    typeEl.style.borderColor = type.fg || '#fff';
  }
}

function setFbText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}

// =====================================
// 初期化
// =====================================
window.addEventListener('load', () => {
  if (window.opener && !window.opener.closed) {
    window.opener.postMessage({ type: 'viewer-ready' }, '*');
  }
});

window.addEventListener('beforeunload', () => {
  if (slideTimer) clearTimeout(slideTimer);
});
</script>
</body>
</html>
