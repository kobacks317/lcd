<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>LCD ビューア</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #viewport {
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      position: absolute;
      left: 50%;
      top: 50%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #mainAreaWrap {
      flex-shrink: 0;
      overflow: hidden;
      background: #000;
      border-bottom: 2px solid #ffff00;
    }

    #mainAreaWrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    #infoAreaWrap {
      flex: 1;
      overflow: hidden;
      background: #111;
      position: relative;
    }

    #infoAreaWrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* デザイン未設定時のフォールバック */
    .main-fallback {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      color: #ffff00;
      font-family: 'Courier New', monospace;
      text-align: center; padding: 20px;
    }
    .main-fallback .fb-state    { font-size: 24px; }
    .main-fallback .fb-type     { font-size: 20px; font-weight: bold; padding: 6px 18px; border: 2px solid #fff; border-radius: 4px; }
    .main-fallback .fb-dest     { font-size: 30px; font-weight: bold; }
    .main-fallback .fb-sta      { font-size: 26px; }

    .info-fallback {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #0f0; font-family: monospace; font-size: 18px; gap: 10px;
    }

    .slide-indicator {
      position: absolute; bottom: 8px; right: 12px;
      font-size: 12px; color: rgba(255,255,100,0.5);
      font-family: monospace; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="viewport">
  <div id="mainAreaWrap" style="height:400px">
    <div class="main-fallback" id="mainFallback">
      <div class="fb-state" id="fbState">接続待機中...</div>
      <div class="fb-type"  id="fbType">-- 種別 --</div>
      <div class="fb-dest"  id="fbDest">-- 行き先 --</div>
      <div class="fb-sta"   id="fbSta">-- 駅名 --</div>
    </div>
  </div>
  <div id="infoAreaWrap">
    <div class="info-fallback" id="infoFallback">
      <div>インフォメーションエリア</div>
      <div style="color:#555;font-size:14px">デザイン定義でスライドを設定してください</div>
    </div>
    <div class="slide-indicator" id="slideIndicator"></div>
  </div>
</div>

<script>
// =====================================
// スケーリング（main.js 方式）
// =====================================
const DESIGN_W = 1920;
const DESIGN_H = 1080;

function updateScale() {
  const scale = Math.min(window.innerWidth / DESIGN_W, window.innerHeight / DESIGN_H);
  const vp = document.getElementById('viewport');
  vp.style.transform = `translate(-50%, -50%) scale(${scale})`;
}
window.addEventListener('resize', updateScale);
updateScale();

// =====================================
// 状態管理
// =====================================
let pendingPacket   = null;
let slideTimer      = null;
let currentSlideIdx = 0;
let currentSlides   = [];
let currentStateKey = null;
let currentMainHtml = null;

// =====================================
// postMessage 受信
// =====================================
window.addEventListener('message', (event) => {
  try {
    const pkt = event.data;
    if (pkt?.operation && pkt?.masterData) {
      pendingPacket = pkt;
      updateDisplay(pkt);
    }
  } catch (err) {
    console.warn('viewer message error:', err);
  }
});

// =====================================
// 表示更新
// =====================================
function updateDisplay(pkt) {
  const op     = pkt.operation;
  const design = pkt.masterData.design || {};

  // メインエリア
  const mainHtml   = design.mainPage?.html   || '';
  const mainHeight = parseInt(design.mainPage?.height) || 400;
  updateMainArea(mainHtml, mainHeight, pkt);

  // インフォエリア スライドショー
  const state     = op.currentState || 'running';
  const slides    = design.infoArea?.states?.[state] || [];
  const stateKey  = state + '|' + slides.map(s => s.html).join(',');

  if (stateKey !== currentStateKey) {
    currentStateKey = stateKey;
    startSlideshow(slides, pkt);
  } else {
    sendToInfoFrame(pkt);
  }

  updateFallback(op, pkt.masterData);
}

// =====================================
// メインエリア
// =====================================
function updateMainArea(html, height, pkt) {
  const wrap = document.getElementById('mainAreaWrap');
  wrap.style.height = height + 'px';

  if (!html) { showMainFallback(true); return; }

  if (html !== currentMainHtml) {
    currentMainHtml = html;
    showMainFallback(false);
    const old = document.getElementById('mainFrame');
    if (old) old.remove();
    const frame = document.createElement('iframe');
    frame.id = 'mainFrame';
    frame.setAttribute('scrolling', 'no');
    frame.addEventListener('load', () => sendToFrame(frame, pkt), { once: false });
    frame.src = html;
    wrap.appendChild(frame);
  } else {
    const frame = document.getElementById('mainFrame');
    if (frame) sendToFrame(frame, pkt);
  }
}

function showMainFallback(show) {
  const fb = document.getElementById('mainFallback');
  const fr = document.getElementById('mainFrame');
  if (fb) fb.style.display = show ? 'flex' : 'none';
  if (fr) fr.style.display = show ? 'none' : 'block';
}

// =====================================
// インフォエリア スライドショー
// =====================================
function startSlideshow(slides, pkt) {
  if (slideTimer) { clearTimeout(slideTimer); slideTimer = null; }
  currentSlideIdx = 0;
  if (!slides || slides.length === 0) { showInfoFallback(true); return; }
  showInfoFallback(false);
  showSlide(slides, pkt);
}

function showSlide(slides, pkt) {
  if (!slides || slides.length === 0) return;
  const slide = slides[currentSlideIdx % slides.length];
  updateSlideIndicator(currentSlideIdx, slides.length, slide);

  if (slide.html) {
    const wrap  = document.getElementById('infoAreaWrap');
    const oldFr = document.getElementById('infoFrame');
    if (oldFr && oldFr.getAttribute('data-src') === slide.html) {
      sendToFrame(oldFr, pkt || pendingPacket);
    } else {
      const frame = document.createElement('iframe');
      frame.id = 'infoFrame';
      frame.setAttribute('scrolling', 'no');
      frame.setAttribute('data-src', slide.html);
      frame.addEventListener('load', () => sendToFrame(frame, pkt || pendingPacket), { once: false });
      frame.src = slide.html;
      if (oldFr) oldFr.remove();
      else document.getElementById('infoFallback')?.remove();
      wrap.insertBefore(frame, wrap.querySelector('.slide-indicator'));
    }
  }

  slideTimer = setTimeout(() => {
    currentSlideIdx = (currentSlideIdx + 1) % slides.length;
    showSlide(slides, pendingPacket);
  }, (slide.duration || 5) * 1000);
}

function sendToInfoFrame(pkt) {
  const frame = document.getElementById('infoFrame');
  if (frame) sendToFrame(frame, pkt);
}

function showInfoFallback(show) {
  const wrap = document.getElementById('infoAreaWrap');
  let fb = document.getElementById('infoFallback');
  const fr = document.getElementById('infoFrame');
  if (show) {
    if (!fb) {
      fb = document.createElement('div');
      fb.id = 'infoFallback'; fb.className = 'info-fallback';
      fb.innerHTML = '<div>インフォメーションエリア</div>';
      wrap.insertBefore(fb, wrap.querySelector('.slide-indicator'));
    }
    fb.style.display = 'flex';
    if (fr) fr.style.display = 'none';
  } else {
    if (fb) fb.style.display = 'none';
    if (fr) fr.style.display = 'block';
  }
}

function updateSlideIndicator(idx, total, slide) {
  const el = document.getElementById('slideIndicator');
  if (el) el.textContent = total > 1 ? `${idx+1}/${total} · ${slide.duration||5}s` : '';
}

// =====================================
// postMessage 転送
// =====================================
function sendToFrame(frame, pkt) {
  if (!frame || !pkt) return;
  try { frame.contentWindow.postMessage(pkt, '*'); } catch {}
}

// =====================================
// フォールバック表示
// =====================================
function updateFallback(op, master) {
  const system = master.train?.systems?.find(s => s.id === op.currentSystemId);
  if (!system) return;
  const stations = [];
  (system.routes || []).forEach(r => {
    const rd = master.routes?.[r.lineId];
    if (rd?.stations) stations.push(...rd.stations);
  });
  const sta  = stations[op.currentStationIndex] || {};
  const type = master.train?.types?.find(t => t.id === op.currentTrainTypeId) || {};
  const lang = (op.displayLanguages || ['ja'])[Math.floor(Date.now() / ((op.displayInterval||3)*1000)) % (op.displayLanguages||['ja']).length];

  const labels = { running:'つぎは', arriving:'まもなく', stopping:'ただいま', departing:'発車します' };
  setText('fbState', (labels[op.currentState] || '') + ' ' + (sta.name?.[lang] || sta.name?.ja || ''));
  setText('fbType',  type.name?.[lang] || type.name?.ja || '--');
  const lastRoute = system.routes?.[system.routes.length - 1];
  setText('fbDest',  lastRoute ? (lastRoute.name || '') + 'ゆき' : '--');
  setText('fbSta',   sta.name?.[lang] || sta.name?.ja || '--');

  const typeEl = document.getElementById('fbType');
  if (typeEl && type.bg) { typeEl.style.background = type.bg; typeEl.style.color = type.fg || '#fff'; typeEl.style.borderColor = type.fg || '#fff'; }
}

function setText(id, text) {
  const el = document.getElementById(id);
  if (el) el.textContent = text;
}

// =====================================
// 初期化
// =====================================
window.addEventListener('load', () => {
  updateScale();
  if (window.opener && !window.opener.closed)
    window.opener.postMessage({ type: 'viewer-ready' }, '*');
});

window.addEventListener('beforeunload', () => {
  if (slideTimer) clearTimeout(slideTimer);
});
</script>
</body>
</html>
