<!DOCTYPE html>
<html lang="ja">

    <head>
        <meta charset="UTF-8">
        <title>main01</title>
        <script src="./main01.js"></script>
        <link rel="stylesheet" href="./main01.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@100..900&family=M+PLUS+1p:wght@100;300;400;500;700;800;900&family=Noto+Sans+JP:wght@100..900&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap&family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700" rel="stylesheet">
    </head>

    <body>
        <div id="main">
            <!-- 種別・行先 -->
            <svg id="arrow" class="arrow"></svg>

            <div id="type-box" class="type-box">
                <p id="type-jp" class="type jp kana letter-4">各駅停車</p>
                <p id="type-en" class="type en">Local</p>
            </div>
            
            <p id="destination-jp" class="destination name jp kana letter-7-in-5">八王子みなみ野</p>
            <p id="destination-en" class="destination name en letter-7-in-5">Hachioji-Minamino</p>
            
            <p id="destination-pre-jp" class="destination pre jp kana">ゆき</p>
            <p id="destination-pre-en" class="destination pre en">for</p>
            
            <!-- 次駅ナンバリング -->
            <div id="numbering-box" class="with-sta-code">
                <p id="sta-code" class="numbering">MKG</p>
                <div id="numbering" class="numbering">
                    <p id="line-code" class="numbering">JN</p>
                    <p id="sta-number" class="numbering">21</p>
                </div>
            </div>
            
            <!-- 次駅名 -->
            <p id="sta-pre-jp" class="sta pre kana jp">次は</p>
            <p id="sta-pre-en" class="sta pre en">Next</p>
            
            <div id="sta-field">
                <p id="sta-name-jp" class="sta name jp letter-6">葛西臨海公園</p>
                <p id="sta-name-en" class="sta name en letter-6">Kasai-Rinkai-Park</p>
                <p id="sta-name-kana" class="sta name kana letter-6">かさいりんかいこうえん</p>
            </div>

            <p id="carNo"></p>
            <p id="time"></p>
        </div>
    </body>

</html>
