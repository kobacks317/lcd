<!DOCTYPE html>
<html lang="ja">

    <head>
        <meta charset="UTF-8">
        <title>main01</title>
        <script src="./main01.js"></script>
        <link rel="stylesheet" href="./main01.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@100..900&family=M+PLUS+1p:wght@100;300;400;500;700;800;900&family=Noto+Sans+JP:wght@100..900&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>

    <body>
        <div id="main">
            <div id="trainInfo">
                <svg id="arrow" class="arrow"></svg>
                <div id="type-box" class="type-box">
                    <p id="type" class="type letter-4">各駅停車</p>
                </div>
                <p id="origin" class="letter-4"></p>
                
                <div id="destination-jp" style="display: none;">
                    <p id="destination-jp-text" class="destination-jp-text letter-7-in-5">八王子みなみ野</p>
                    <p id="yuki-jp" style="position: absolute; top: 285px; left: 360px; font-size: 55px;">ゆき</p>
                </div>
                <div id="destination-en" style="display: none; position: relative;">
                    <p id="destination-en-text" class="destination-en-text letter-7-in-5">Hachioji-Minamino</p>
                    <p id="yuki-en" style="position: absolute; top: 20px; left: 20px; font-size: 40px;">for</p>
                </div>
            </div>

            <div id="numbering-box">
                <div id="nummbering" class="numbering">
                    <p id="line-code">JN</p>
                    <p id="sta-number" class="numbering-text">21</p>
                </div>
            </div>
            
            <p id="status-jp" class="status-jp" style="display: none;">次は</p>
            <p id="status-en" class="status-en" style="display: none;">Next</p>
            
            <div id="staField">
                <div id="staName-jp" style="display: none;">
                    <p id="staName-jp-text" class="sta-name-jp-text letter-6">葛西臨海公園</p>
                </div>
                <div id="staName-en" style="display: none;">
                    <p id="staName-en-text" class="sta-name-en-text letter-6">Kasai-Rinkai-Park</p>
                </div>
                <div id="staName-kana" style="display: none;">
                    <p id="staName-kana-text" class="sta-name-kana-text letter-6">かさいりんかいこうえん</p>
                </div>
            </div>

            <p id="carNo"></p>
            <p id="time"></p>
        </div>
    </body>

</html>
