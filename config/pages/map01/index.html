<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>map01</title>
    <link rel="stylesheet" href="./map01.css">
    <script src="./map01.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@100..900&family=M+PLUS+1p:wght@100;300;400;500;700;800;900&family=Noto+Sans+JP:wght@100..900&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- <div id="menu">
        南武線
    </div> -->
    <div id="lcd">

        <div id="info">
            <div id="detail-map">
                <svg width="0" height="0" style="position:absolute;">
                    <defs>
                        <!-- 0〜1 の範囲が 0%〜100% に対応します -->
                        <clipPath id="wave-right" clipPathUnits="objectBoundingBox">
                            <path d="M 0,0 
                                    L 0.9,0 
                                    C 0.6, 0.4, 1.2, 0.6, 0.9, 1 
                                    L 0,1 
                                    Z" />
                    </defs>
                </svg>
                <div id="dmc-01" class="dmc">
                    <div class="dmc-sta-name jp v-letter-2 grey">立川</div>
                    <div class="dmc-sta-name en grey">Tachikawa</div>
                    
                    <div class="dmc-line left grey terminal"></div>
                    <div class="dmc-line right grey"></div>
                    <div class="marker-border">
                        <div class="marker-main"></div>
                    </div>
                    <div class="dmc-numbering">
                        <p class="dmc-numbering-line-code">JN</p>
                        <p class="dmc-numbering-sta-number">26</p>
                    </div>
                    <div class="dmc-circle grey"></div>
                    <div class="dmc-transfer"></div>
                </div>
                <div id="dmc-02" class="dmc">
                    <div class="dmc-sta-name jp v-letter-3">西国立</div>
                    <div class="dmc-sta-name en two-row">Nishi-<br>Kunitachi</div>
                    
                    <div class="dmc-line left grey"></div>
                    <div class="dmc-line right"></div>
                    <div class="marker-border stopping">
                        <div class="marker-main stopping"></div>
                    </div>
                    <div class="dmc-numbering">
                        <p class="dmc-numbering-line-code">JN</p>
                        <p class="dmc-numbering-sta-number">26</p>
                    </div>
                    <div class="dmc-circle now"></div>
                    <div class="dmc-transfer"></div>
                </div>
                <div id="dmc-03" class="dmc">
                    <div class="dmc-sta-name jp v-letter-7">八王子みなみ野</div>
                    <div class="dmc-sta-name en two-row">Hachioji-<br>Minamino</div>
                    
                    <div class="dmc-line left"></div>
                    <div class="dmc-line right continue"></div>
                    <div class="marker-border">
                        <div class="marker-main"></div>
                    </div>
                    <div class="dmc-numbering">
                        <p class="dmc-numbering-line-code">JN</p>
                        <p class="dmc-numbering-sta-number">26</p>
                    </div>
                    <div class="dmc-circle">3</div>
                    <div class="dmc-transfer"></div>
                </div>
                <div id="dmc-04" class="dmc blank">
                    <div class="dmc-sta-name jp v-letter-6">葛西臨海公園</div>
                    <div class="dmc-sta-name en two-row">Kasai-<br>Rinkai Park</div>
                    
                    <div class="dmc-line left"></div>
                    <div class="dmc-line right grey"></div>
                    <div class="marker-border">
                        <div class="marker-main"></div>
                    </div>
                    <div class="dmc-numbering">
                        <p class="dmc-numbering-line-code">JN</p>
                        <p class="dmc-numbering-sta-number">26</p>
                    </div>
                    <div class="dmc-circle">4</div>
                    <div class="dmc-transfer"></div>
                </div>
                <div id="dmc-05" class="dmc">
                    <div class="dmc-sta-name jp v-letter-5 grey">武蔵溝ノ口</div>
                    <div class="dmc-sta-name en two-row grey">Musashi-<br>Mizonokuchi</div>
                    
                    <div class="dmc-line left grey"></div>
                    <div class="dmc-line right grey"></div>
                    <div class="marker-border">
                        <div class="marker-main"></div>
                    </div>
                    <div class="dmc-numbering">
                        <p class="dmc-numbering-line-code">JN</p>
                        <p class="dmc-numbering-sta-number">26</p>
                    </div>
                    <div class="dmc-circle grey"></div>
                    <div class="dmc-transfer"></div>
                </div>
                <div id="dmc-06" class="dmc">
                    <div class="dmc-sta-name jp v-letter-4">分倍河原</div>
                    <div class="dmc-sta-name en">Bubaigawara</div>

                    <div class="dmc-line left"></div>
                    <div class="dmc-line right"></div>
                    <div class="marker-border running">
                        <div class="marker-main running"></div>
                    </div>
                    <div class="dmc-numbering">
                        <p class="dmc-numbering-line-code">JN</p>
                        <p class="dmc-numbering-sta-number">26</p>
                    </div>
                    <div class="dmc-circle next">6</div>
                    <div class="dmc-transfer"></div>
                </div>
                <div id="dmc-07" class="dmc">
                    <div class="dmc-sta-name jp v-letter-4 grey">府中本町</div>
                    <div class="dmc-sta-name en two-row grey">Fuchu-<br>hommachi</div>

                    <div class="dmc-line left"></div>
                    <div class="dmc-line right omit"></div>
                    <div class="marker-border">
                        <div class="marker-main"></div>
                    </div>
                    <div class="dmc-numbering">
                        <p class="dmc-numbering-line-code">JN</p>
                        <p class="dmc-numbering-sta-number">26</p>
                    </div>
                    <div class="dmc-circle pass"></div>
                    <div class="dmc-transfer"></div>
                </div>
                <div id="dmc-08" class="dmc">
                    <div class="dmc-sta-name jp v-letter-3">南多摩</div>
                    <div class="dmc-sta-name en">Minami-Tama</div>

                    <div class="dmc-line left omit"></div>
                    <div class="dmc-line right end"></div>
                    <div class="marker-border">
                        <div class="marker-main"></div>
                    </div>
                    <div class="dmc-numbering">
                        <p class="dmc-numbering-line-code">JN</p>
                        <p class="dmc-numbering-sta-number">26</p>
                    </div>
                    <div class="dmc-circle">8</div>
                    <div class="dmc-transfer"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
